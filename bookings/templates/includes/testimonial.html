{% load static %}
<section id="testimonials">
  <div class="container">
    <div class="section-title">
      <h2>Testimonial</h2>
      <p class="mt-3">What our clients say! Real feedback from real customers</p>
    </div>
    <div class="row gx-5 mt-3">
      
      <!-- Andheri -->
      <div class="col-md-6 mb-3">
        <h3>Andheri</h3>
        <div class="testimonials-slider" id="andheri-slider"></div>
      </div>
      
      <!-- Dadar -->
      <div class="col-md-6 mb-3">
        <h3>Dadar</h3>
        <div class="testimonials-slider" id="dadar-slider"></div>
      </div>
      
    </div>
  </div>
</section>




<!-- jQuery + Slick -->
<!--<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>-->
<!--<script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>-->

<script>
// ⭐ Generate stars
function getStars(rating) {
  let stars = '';
  for (let i = 1; i <= 5; i++) {
    stars += i <= rating 
      ? '<span style="color:#ffba25;">★</span>' 
      : '<span style="color:#ccc;">☆</span>';
  }
  return `<div class="stars">${stars}</div>`;
}

// ⭐ Load reviews with truncation + Read More + Auto-close
function loadReviews(jsonFile, sliderId, truncateLength = 100, callback = null) {
  fetch(jsonFile)
    .then(res => res.json())
    .then(data => {
      const slider = document.getElementById(sliderId);
      data.data.forEach((review, idx) => {
        const slide = document.createElement('div');
        slide.classList.add('testimonial');

        const fullText = review.review || "";
        const displayText = fullText.length > truncateLength 
                            ? fullText.substring(0, truncateLength) + '...' 
                            : fullText;

        slide.innerHTML = `
          <div class="avatar"><img src="${review.image}" width="50" alt="${review.name}"></div>
          <div class="content">
            <div class="name">${review.name}</div>
            ${getStars(review.rating)}
            <div class="text" id="text-${sliderId}-${idx}"></div>
          </div>
        `;

        const textEl = slide.querySelector('.text');
        const textSpan = document.createElement('span');
        textSpan.textContent = displayText;
        textEl.appendChild(textSpan);

        // Add Read More if truncated
        if (fullText.length > truncateLength) {
          const readMore = document.createElement('span');
          readMore.className = 'read-more';
          readMore.textContent = 'Read More';

          let autoCloseTimer = null;

          readMore.addEventListener('click', () => {
            if (textSpan.textContent.endsWith('...')) {
              // Expand
              textSpan.textContent = fullText;
              readMore.textContent = 'Show Less';

              // Recalculate slick height
              $(`#${sliderId}`).slick('setPosition');

              // Start auto-close timer (5s)
              if (autoCloseTimer) clearTimeout(autoCloseTimer);
              autoCloseTimer = setTimeout(() => {
                textSpan.textContent = fullText.substring(0, truncateLength) + '...';
                readMore.textContent = 'Read More';
                $(`#${sliderId}`).slick('setPosition');
              }, 5000);

            } else {
              // Collapse manually
              textSpan.textContent = fullText.substring(0, truncateLength) + '...';
              readMore.textContent = 'Read More';

              // Recalculate slick height
              $(`#${sliderId}`).slick('setPosition');

              if (autoCloseTimer) clearTimeout(autoCloseTimer);
            }
          });

          textEl.appendChild(readMore);
        }

        slider.appendChild(slide);
      });

      if (callback) callback();
    })
    .catch(err => console.error(`Error loading ${sliderId}:`, err));
}

// ⭐ Initialize slick
function startSlick(selector) {
  const $el = $(selector);
  if ($el.hasClass("slick-initialized")) {
    $el.slick("unslick");
  }
  $el.slick({
    arrows: true,
    infinite: true,
    vertical: true,
    verticalSwiping: true,
    slidesToShow: 2,
    slidesToScroll: 1,
    autoplay: true,
    autoplaySpeed: 4000,
    speed: 600,
    adaptiveHeight: true,
    pauseOnHover: true,
    responsive: [
      { breakpoint: 768, settings: { slidesToShow: 1, arrows: true, slidesToShow: 2 } }
    ]
  });
}

// ⭐ Load sliders then init
Promise.all([
  new Promise(res => loadReviews('includes/reviews_andheri.json', 'andheri-slider', 100, res)),
  new Promise(res => loadReviews('includes/reviews_dadar.json', 'dadar-slider', 100, res))
]).then(() => {
  setTimeout(() => {
    startSlick('#andheri-slider');
    startSlick('#dadar-slider');
  }, 300);
});
</script>
